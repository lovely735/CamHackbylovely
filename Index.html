<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Safe Security Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .box { background: #2a2a2a; border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 10px; margin-top: 20px; }
        button { background-color: #00ff00; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>🛡️ My GitHub Security Lab 🛡️</h1>
    <p>Sirf GitHub use kar ke banaya gaya pehla page.</p>

    <div class="box">
        <h3>Device Audit Info:</h3>
        <p id="browser-info">Checking system...</p>
        <p id="status-info">Checking connection...</p>
        <button onclick="checkSecurity()">Scan Device Status</button>
    </div>

    <script>
        function checkSecurity() {
            // Yeh lines user ke browser aur online status ko legally read karti hain
            document.getElementById('browser-info').innerText = "System App/Browser: " + navigator.userAgent;
            
            if(navigator.onLine) {
                document.getElementById('status-info').innerText = "Internet Status: Securely Connected 🟢";
            } else {
                document.getElementById('status-info').innerText = "Internet Status: Offline 🔴";
            }
        }
    </script>

</body>
</html>
